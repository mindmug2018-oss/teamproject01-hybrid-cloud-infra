# inventory/hosts_aws_ts.ini
# Tailscale-based inventory for AWS deployment
# All hosts reachable directly via Tailscale 100.x.x.x IPs
# NO ProxyJump needed — GitHub Actions runner joins same Tailscale network
#
# Fill in Tailscale IPs after first deployment:
#   tailscale ip -4   (run on each server)
# Or check: https://login.tailscale.com/admin/machines

[mgmt]
# Replace with your mgmt Tailscale IP (100.x.x.x)
MGMT_TAILSCALE_IP ansible_user=user1

[rocky]
# Replace with your rocky1 and rocky2 Tailscale IPs
ROCKY1_TAILSCALE_IP ansible_user=user1
ROCKY2_TAILSCALE_IP ansible_user=user1

[ubuntu]
# Replace with your ubuntu1 Tailscale IP
UBUNTU1_TAILSCALE_IP ansible_user=user1

[all:vars]
ansible_ssh_private_key_file=~/.ssh/teamproj01ansiblekey.pem
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
db_host=UBUNTU1_TAILSCALE_IP