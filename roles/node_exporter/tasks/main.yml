- name: mgmt에서 node_exporter 다운로드
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}.tar.gz"
    dest: "/tmp/node_exporter.tar.gz"
    force: yes
  delegate_to: localhost

- name: node_exporter 바이너리 전송
  copy:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/node_exporter.tar.gz

- name: 압축 해제
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: yes

- name: 바이너리 이동
  copy:
    src: "/tmp/node_exporter-1.7.0.linux-{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: yes
    force: yes
  become: yes

- name: SELinux 컨텍스트 복원
  command: restorecon -v /usr/local/bin/node_exporter
  become: yes
  when: ansible_os_family == "RedHat"

- name: systemd 서비스 등록
  copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=always

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  become: yes

- name: node_exporter 서비스 시작
  systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes