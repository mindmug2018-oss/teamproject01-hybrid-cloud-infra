# ~/project/monitoring/alertmanager.yml

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'slack-default'
  routes:
    - match:
        severity: critical
      receiver: 'slack-and-recovery'

receivers:
  - name: 'slack-default'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/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'
        channel: '#monitoring'
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        send_resolved: true

  - name: 'slack-and-recovery'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/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'
        channel: '#critical-alerts'
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
    webhook_configs:
      - url: 'http://localhost:9080/alert'
        send_resolved: false
