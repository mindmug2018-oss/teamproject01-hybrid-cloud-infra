global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 5m
  receiver: 'slack-default'
  routes:
    - match:
        severity: critical
      receiver: 'slack-and-recovery'
      continue: true
    - match:
        severity: critical
      receiver: 'telegram'
    - match:
        severity: warning
      receiver: 'slack-default'
      continue: true          # ← add continue: true
    - match:
        severity: warning
      receiver: 'telegram'

receivers:
  - name: 'telegram'
    webhook_configs:
      - url: 'http://localhost:9087/alert/8646527871'
        send_resolved: true

  - name: 'slack-default'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/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'
        channel: '#all-mindmug'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'slack-and-recovery'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/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'
        channel: '#all-mindmug'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    webhook_configs:
      - url: 'http://localhost:9080/alert'
        send_resolved: false