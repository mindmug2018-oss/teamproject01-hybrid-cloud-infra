---
# roles/monitoring/tasks/main.yml

# ── Prometheus ────────────────────────────────────────────────────────
- name: Create prometheus user
  user:
    name: prometheus
    system: yes
    shell: /bin/false
    create_home: no
  become: yes

- name: Create prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/prometheus
    - /var/lib/prometheus
  become: yes

- name: Gather architecture fact
  setup:
    filter: ansible_architecture
  become: yes

- name: Download Prometheus binary
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}.tar.gz"
    dest: /tmp/prometheus.tar.gz
    force: no
  become: yes

- name: Extract Prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp
    remote_src: yes
  become: yes

- name: Install Prometheus binaries
  copy:
    src: "/tmp/prometheus-2.51.0.linux-{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - prometheus
    - promtool
  become: yes

- name: Copy Prometheus console files
  copy:
    src: "/tmp/prometheus-2.51.0.linux-{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}/{{ item }}"
    dest: "/etc/prometheus/{{ item }}"
    remote_src: yes
    owner: prometheus
  loop:
    - consoles
    - console_libraries
  become: yes

- name: Deploy prometheus.yml config
  copy:
    src: prometheus.yml
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    mode: '0644'
  become: yes
  notify: restart prometheus

- name: Deploy alert rules
  copy:
    src: alert.rules.yml
    dest: /etc/prometheus/alert.rules.yml
    owner: prometheus
    mode: '0644'
  become: yes
  notify: restart prometheus

- name: Create Prometheus systemd service
  copy:
    dest: /etc/systemd/system/prometheus.service
    content: |
      [Unit]
      Description=Prometheus
      After=network.target

      [Service]
      Type=simple
      User=prometheus
      ExecStart=/usr/local/bin/prometheus \
        --config.file=/etc/prometheus/prometheus.yml \
        --storage.tsdb.path=/var/lib/prometheus \
        --web.console.templates=/etc/prometheus/consoles \
        --web.console.libraries=/etc/prometheus/console_libraries
      Restart=always
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  become: yes
  notify: restart prometheus

- name: Restore SELinux context for prometheus
  command: restorecon -v /usr/local/bin/prometheus /usr/local/bin/promtool
  become: yes
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Start and enable Prometheus
  systemd:
    name: prometheus
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

# ── Alertmanager ──────────────────────────────────────────────────────
- name: Create alertmanager user
  user:
    name: alertmanager
    system: yes
    shell: /bin/false
    create_home: no
  become: yes

- name: Create alertmanager directories
  file:
    path: "{{ item }}"
    state: directory
    owner: alertmanager
    group: alertmanager
    mode: '0755'
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager
  become: yes

- name: Download Alertmanager binary
  get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v0.27.0/alertmanager-0.27.0.linux-{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}.tar.gz"
    dest: /tmp/alertmanager.tar.gz
    force: no
  become: yes

- name: Extract Alertmanager
  unarchive:
    src: /tmp/alertmanager.tar.gz
    dest: /tmp
    remote_src: yes
  become: yes

- name: Install Alertmanager binaries
  copy:
    src: "/tmp/alertmanager-0.27.0.linux-{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - alertmanager
    - amtool
  become: yes

- name: Deploy alertmanager.yml config
  copy:
    src: alertmanager.yml
    dest: /etc/alertmanager/alertmanager.yml
    owner: alertmanager
    mode: '0644'
  become: yes
  notify: restart alertmanager

- name: Create Alertmanager systemd service
  copy:
    dest: /etc/systemd/system/alertmanager.service
    content: |
      [Unit]
      Description=AlertManager
      After=network.target

      [Service]
      Type=simple
      User=alertmanager
      ExecStart=/usr/local/bin/alertmanager \
        --config.file=/etc/alertmanager/alertmanager.yml \
        --storage.path=/var/lib/alertmanager
      Restart=always
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  become: yes
  notify: restart alertmanager

- name: Restore SELinux context for alertmanager
  command: restorecon -v /usr/local/bin/alertmanager /usr/local/bin/amtool
  become: yes
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Start and enable Alertmanager
  systemd:
    name: alertmanager
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

# ── Grafana ───────────────────────────────────────────────────────────
- name: Add Grafana yum repository
  yum_repository:
    name: grafana
    description: Grafana OSS
    baseurl: https://packages.grafana.com/oss/rpm
    gpgcheck: yes
    gpgkey: https://packages.grafana.com/gpg.key
    enabled: yes
  become: yes
  when: ansible_os_family == "RedHat"

- name: Install Grafana
  package:
    name: grafana
    state: present
  become: yes

- name: Start and enable Grafana
  systemd:
    name: grafana-server
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

# ── Firewall ──────────────────────────────────────────────────────────
- name: Start and enable firewalld
  service:
    name: firewalld
    state: started
    enabled: yes
  become: yes
  ignore_errors: yes

- name: Open monitoring ports
  firewalld:
    port: "{{ item }}/tcp"
    permanent: yes
    state: enabled
    immediate: yes
  loop:
    - "9090"
    - "9093"
    - "3000"
    - "9087"
    - "9080"
    - "9100"
  become: yes
  ignore_errors: yes