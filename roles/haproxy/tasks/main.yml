---
# roles/haproxy/tasks/main.yml

- name: Install HAProxy
  dnf:
    name: haproxy
    state: present
  become: yes

- name: Deploy HAProxy config
  copy:
    dest: /etc/haproxy/haproxy.cfg
    content: |
      global
          log         127.0.0.1 local2
          daemon

      defaults
          log     global
          mode    http
          option  httplog
          timeout connect  5s
          timeout client   30s
          timeout server   30s

      frontend web_front
          bind *:80
          default_backend app_servers

      backend app_servers
          balance roundrobin
          option  httpchk
          http-check send meth GET uri /health ver HTTP/1.1 hdr Host localhost
          http-check expect status 200
          server rocky1 {{ groups['rocky'][0] }}:8000 check inter 5s fall 3 rise 2
          server rocky2 {{ groups['rocky'][1] }}:8000 check inter 5s fall 3 rise 2

      frontend stats
          bind *:8404
          stats enable
          stats uri /stats
          stats refresh 5s
          stats auth admin:admin123
    mode: '0644'
  become: yes
  notify: restart haproxy

- name: Validate HAProxy config before starting
  command: haproxy -c -f /etc/haproxy/haproxy.cfg
  become: yes
  changed_when: false

- name: Install SELinux policy tools
  dnf:
    name: policycoreutils-python-utils
    state: present
  become: yes
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Allow HAProxy to connect to any port (SELinux)
  seboolean:
    name: haproxy_connect_any
    state: yes
    persistent: yes
  become: yes
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Start and enable HAProxy
  systemd:
    name: haproxy
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes