---
# roles/docker_fastapi/tasks/main.yml

# ── Add user to docker group ───────────────────────────────────────────
- name: Add user1 to docker group
  user:
    name: user1
    groups: docker
    append: yes
  become: yes

# ── Create app directory ───────────────────────────────────────────────
- name: Create Docker app directory
  file:
    path: /opt/docker-app
    state: directory
    owner: user1
    mode: '0755'
  become: yes

# ── Stop and remove legacy systemd FastAPI service ────────────────────
- name: Stop legacy FastAPI systemd service if present
  systemd:
    name: fastapi
    state: stopped
    enabled: no
  ignore_errors: yes
  become: yes

- name: Remove legacy FastAPI systemd service file
  file:
    path: /etc/systemd/system/fastapi.service
    state: absent
  become: yes

- name: Reload systemd after removing legacy service
  systemd:
    daemon_reload: yes
  become: yes

# ── Kill any process using port 8000 ─────────────────────────────────
- name: Free port 8000 if occupied
  shell: fuser -k 8000/tcp || true
  become: yes
  changed_when: false

# ── Copy application files ─────────────────────────────────────────────
- name: Copy main.py to app directory
  copy:
    src: app/main.py
    dest: /opt/docker-app/main.py
    owner: user1
    mode: '0644'
  become: yes

- name: Copy requirements.txt to app directory
  copy:
    dest: /opt/docker-app/requirements.txt
    content: |
      fastapi==0.111.0
      uvicorn==0.30.1
      psycopg2-binary==2.9.9
      prometheus-fastapi-instrumentator==6.1.0
    owner: user1
    mode: '0644'
  become: yes

- name: Copy Dockerfile to app directory
  copy:
    dest: /opt/docker-app/Dockerfile
    content: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      COPY . .
      EXPOSE 8000
      CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    owner: user1
    mode: '0644'
  become: yes

# ── Stop and remove existing container ────────────────────────────────
- name: Stop existing FastAPI container if running
  community.docker.docker_container:
    name: fastapi
    state: absent
  become: yes
  ignore_errors: yes

# ── Build image ────────────────────────────────────────────────────────
- name: Build FastAPI Docker image
  community.docker.docker_image:
    name: fastapi-app
    tag: latest
    build:
      path: /opt/docker-app
    source: build
    force_source: yes
  become: yes

# ── Run container ──────────────────────────────────────────────────────
- name: Run FastAPI Docker container
  community.docker.docker_container:
    name: fastapi
    image: fastapi-app:latest
    state: started
    restart_policy: always
    published_ports:
      - "8000:8000"
    env:
      DATABASE_URL: "postgresql://appuser:apppass123@{{ db_host | default('192.168.61.136') }}:5432/appdb"
  become: yes