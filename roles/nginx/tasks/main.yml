---
# roles/nginx/tasks/main.yml
# FIXED: added SELinux boolean so Nginx can proxy to Docker FastAPI on AWS

# ── Install ────────────────────────────────────────────────────────────
- name: Install Nginx (Rocky / RedHat)
  dnf:
    name: nginx
    state: present
  become: yes
  when: ansible_os_family == "RedHat"

- name: Install Nginx (Ubuntu / Debian)
  apt:
    name: nginx
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == "Debian"

# ── SELinux: allow Nginx to proxy to local ports (needed on AWS) ──────
- name: Allow Nginx to connect to network (SELinux)
  seboolean:
    name: httpd_can_network_connect
    state: yes
    persistent: yes
  become: yes
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

# ── Rewrite nginx.conf cleanly (no default server block) ──────────────
- name: Deploy clean nginx.conf without default server block
  copy:
    dest: /etc/nginx/nginx.conf
    content: |
      user nginx;
      worker_processes auto;
      error_log /var/log/nginx/error.log notice;
      pid /run/nginx.pid;

      include /usr/share/nginx/modules/*.conf;

      events {
          worker_connections 1024;
      }

      http {
          log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for"';

          access_log  /var/log/nginx/access.log  main;

          sendfile            on;
          tcp_nopush          on;
          keepalive_timeout   65;
          types_hash_max_size 4096;

          include             /etc/nginx/mime.types;
          default_type        application/octet-stream;

          include /etc/nginx/conf.d/*.conf;
      }
    mode: '0644'
    owner: root
    group: root
  become: yes
  when: ansible_os_family == "RedHat"
  notify: restart nginx

# ── Remove default config files ───────────────────────────────────────
- name: Remove default nginx config to avoid port conflict
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/conf.d/default.conf
    - /etc/nginx/sites-enabled/default
  become: yes
  ignore_errors: yes

# ── Deploy FastAPI reverse proxy config ───────────────────────────────
- name: Deploy Nginx FastAPI reverse-proxy config
  copy:
    dest: /etc/nginx/conf.d/fastapi.conf
    content: |
      server {
          listen 80 default_server;
          server_name _;

          location / {
              proxy_pass         http://127.0.0.1:8000;
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          }

          location /health {
              proxy_pass http://127.0.0.1:8000/health;
          }

          location /metrics {
              proxy_pass http://127.0.0.1:8000/metrics;
          }
      }
    mode: '0644'
  become: yes
  notify: restart nginx

# ── Service ────────────────────────────────────────────────────────────
- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes