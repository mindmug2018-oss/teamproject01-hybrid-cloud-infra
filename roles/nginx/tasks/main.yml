# ~/project/roles/nginx/tasks/main.yml
---
- name: Nginx 설치
  dnf:
    name: nginx
    state: present
  become: yes

- name: Nginx FastAPI 프록시 설정
  copy:
    dest: /etc/nginx/conf.d/fastapi.conf
    content: |
      server {
          listen 80;
          server_name _;

          location / {
              proxy_pass         http://127.0.0.1:8000;
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          }

          location /health {
              proxy_pass http://127.0.0.1:8000/health;
          }

          location /metrics {
              proxy_pass http://127.0.0.1:8000/metrics;
          }
      }
    mode: '0644'
  become: yes
  notify: restart nginx

- name: default.conf 비활성화 (포트 충돌 방지)
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  become: yes

- name: Nginx 서비스 시작
  systemd:
    name: nginx
    state: started
    enabled: yes
  become: yes
