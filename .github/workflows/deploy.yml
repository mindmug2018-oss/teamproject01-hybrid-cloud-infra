# .github/workflows/deploy.yml
# CI/CD Pipeline — Two parallel tracks:
#
#   TRACK A: On-Prem (self-hosted runner on mgmt VM)
#     push → test → docker build → ansible site.yml → notify
#
#   TRACK B: AWS (GitHub-hosted runner)
#     push → test → docker build → terraform apply
#          → ansible site_aws.yml → verify → terraform destroy → notify


name: Build → Test → Deploy (On-Prem + AWS)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USER }}/fastapi-app
  AWS_REGION: ap-northeast-2
  TF_DIR: terraform

jobs:
  # ════════════════════════════════════════════════════════════════════
  # JOB 1 — Code & Syntax Checks (shared by both tracks)
  # ════════════════════════════════════════════════════════════════════
  test:
    name: Code checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check main.py
        run: |
          python -c "
          import ast
          with open('roles/docker_fastapi/files/app/main.py') as f:
              src = f.read()
          ast.parse(src)
          print('✅ main.py syntax OK')
          "

      - name: Syntax check all YAML files
        run: |
          pip install pyyaml
          python -c "
          import yaml, glob, sys
          files = glob.glob('playbooks/*.yml') + glob.glob('roles/**/*.yml', recursive=True)
          errors = []
          for f in files:
              try:
                  yaml.safe_load(open(f))
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('❌ YAML errors:')
              [print(e) for e in errors]
              sys.exit(1)
          print(f'✅ {len(files)} YAML files OK')
          "

  # ════════════════════════════════════════════════════════════════════
  # JOB 2 — Docker Build & Push (shared by both tracks)
  # ════════════════════════════════════════════════════════════════════
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v6
        with:
          context: roles/docker_fastapi/files/app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ════════════════════════════════════════════════════════════════════
  # JOB 3A — On-Prem Deploy (self-hosted runner on your mgmt VM)
  # ════════════════════════════════════════════════════════════════════
  deploy-onprem:
    name: Deploy to On-Prem (VMware)
    runs-on: self-hosted
    needs: docker
    steps:
      - name: Pull latest code and run Ansible
        run: |
          set -e
          echo "=== On-Prem deploy start: $(date) ==="
          cd ~/project1-onpremise
          git pull origin main
          ansible-playbook playbooks/site.yml \
            -i inventory/hosts.ini \
            --diff
          echo "=== On-Prem deploy complete: $(date) ==="

      - name: Verify on-prem health
        run: |
          sleep 10
          curl -sf http://192.168.61.133/health | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          assert d['status'] == 'ok', f'Health check failed: {d}'
          print('✅ On-prem health check passed:', d)
          "

      - name: Slack on-prem success
        if: success()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ *[ON-PREM] Deploy OK* | branch: \`${{ github.ref_name }}\` | by: ${{ github.actor }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true

      - name: Telegram on-prem success
        if: success()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"✅ [ON-PREM] Deploy OK\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\"}" || true

      - name: Slack on-prem failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *[ON-PREM] Deploy FAILED* | branch: \`${{ github.ref_name }}\` | by: ${{ github.actor }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true

      - name: Telegram on-prem failure
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"❌ [ON-PREM] Deploy FAILED\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\"}" || true

  # ════════════════════════════════════════════════════════════════════
  # JOB 3B — AWS Deploy (GitHub-hosted runner)
  #   terraform apply → ansible → verify → terraform destroy
  #   Runs on every push to main. Auto-destroys to minimize cost.
  # ════════════════════════════════════════════════════════════════════
  deploy-aws:
    name: Deploy to AWS (Terraform + Ansible + Destroy)
    runs-on: ubuntu-latest
    needs: docker
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-northeast-2

    steps:
      - uses: actions/checkout@v4.2.2

      # ── Setup tools ─────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Install Ansible + dependencies
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install community.docker amazon.aws

      # ── Write SSH key files ──────────────────────────────────────────
      - name: Write SSH key files
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_KEY }}" > ~/.ssh/teamproj01ansiblekey.pem
          chmod 600 ~/.ssh/teamproj01ansiblekey.pem
          echo "${{ secrets.TF_PUBLIC_KEY }}" > ~/.ssh/teamproj01ansiblekey.pub
          chmod 644 ~/.ssh/teamproj01ansiblekey.pub

      # ── Terraform Apply ─────────────────────────────────────────────
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="public_key_path=$HOME/.ssh/teamproj01ansiblekey.pub" \
            -var="admin_cidr=0.0.0.0/0"

      # ── Generate Ansible inventory from Terraform outputs ──────────
      - name: Generate hosts_aws.ini
        working-directory: ${{ env.TF_DIR }}
        run: |
          MGMT_IP=$(terraform output -raw mgmt_public_ip)
          ROCKY1_IP=$(terraform output -raw rocky1_private_ip)
          ROCKY2_IP=$(terraform output -raw rocky2_private_ip)
          UBUNTU1_IP=$(terraform output -raw ubuntu1_private_ip)

          cat > ../inventory/hosts_aws.ini << EOF
          [mgmt]
          ${MGMT_IP} ansible_user=user1

          [rocky]
          ${ROCKY1_IP} ansible_user=user1 ansible_ssh_common_args='-o ProxyJump=user1@${MGMT_IP} -o StrictHostKeyChecking=no'
          ${ROCKY2_IP} ansible_user=user1 ansible_ssh_common_args='-o ProxyJump=user1@${MGMT_IP} -o StrictHostKeyChecking=no'

          [ubuntu]
          ${UBUNTU1_IP} ansible_user=user1 ansible_ssh_common_args='-o ProxyJump=user1@${MGMT_IP} -o StrictHostKeyChecking=no'

          [all:vars]
          ansible_ssh_private_key_file=$HOME/.ssh/teamproj01ansiblekey.pem
          ansible_python_interpreter=/usr/bin/python3
          db_host=${UBUNTU1_IP}
          EOF

          echo "MGMT_IP=${MGMT_IP}" >> $GITHUB_ENV
          echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> $GITHUB_ENV
          echo "CLOUDWATCH_URL=$(terraform output -raw cloudwatch_dashboard_url)" >> $GITHUB_ENV

          echo "=== Generated inventory ==="
          cat ../inventory/hosts_aws.ini

      # ── Wait for instances to be ready ───────────────────────────────
      - name: Wait for SSH on mgmt
        run: |
          echo "Waiting for mgmt SSH to be ready..."
          for i in $(seq 1 30); do
            if ssh -i ~/.ssh/teamproj01ansiblekey.pem \
                   -o ConnectTimeout=5 \
                   -o StrictHostKeyChecking=no \
                   user1@${{ env.MGMT_IP }} "echo ready" 2>/dev/null | grep -q ready; then
              echo "✅ SSH ready on mgmt"
              break
            fi
            echo "Attempt $i/30 — waiting 10s..."
            sleep 10
          done

      # ── Ansible Deploy ───────────────────────────────────────────────
      - name: Run Ansible site_aws.yml
        run: |
          ansible-playbook playbooks/site_aws.yml \
            -i inventory/hosts_aws.ini \
            --ssh-common-args='-o StrictHostKeyChecking=no' \
            --diff

      # ── Verify deployment ────────────────────────────────────────────
      - name: Verify AWS health check
        run: |
          echo "Waiting 30s for ALB to become healthy..."
          sleep 30
          for i in $(seq 1 10); do
            RESULT=$(curl -sf "http://${{ env.ALB_DNS }}/health" 2>/dev/null || echo "failed")
            if echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['status']=='ok'" 2>/dev/null; then
              echo "✅ AWS ALB health check passed: $RESULT"
              break
            fi
            echo "Attempt $i/10 — retrying in 15s... ($RESULT)"
            sleep 15
          done

      # ── Notify success BEFORE destroy ────────────────────────────────
      - name: Notify AWS deploy success
        if: success()
        run: |
          MSG="✅ [AWS] Deploy OK\nALB: http://${{ env.ALB_DNS }}\nCloudWatch: ${{ env.CLOUDWATCH_URL }}\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\n⚠️ Destroying in 60s to avoid charges..."

          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${MSG}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"${MSG}\"}" || true

          # Give time to view ALB before destroy
          sleep 60

      # ── Terraform Destroy (ALWAYS runs to avoid charges) ─────────────
      - name: Terraform Destroy
        if: always()
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "=== Destroying AWS infrastructure to avoid charges ==="
          terraform destroy -auto-approve \
            -var="public_key_path=$HOME/.ssh/teamproj01ansiblekey.pub" \
            -var="admin_cidr=0.0.0.0/0" || true
          echo "=== Destroy complete: $(date) ==="

      # ── Final notifications ───────────────────────────────────────────
      - name: Slack AWS failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *[AWS] Deploy FAILED* | branch: \`${{ github.ref_name }}\` | by: ${{ github.actor }}\nInfrastructure has been destroyed.\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true

      - name: Telegram AWS failure
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"❌ [AWS] Deploy FAILED\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\nInfrastructure destroyed.\"}" || true

      - name: Notify destroy complete
        if: always()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🗑️ *[AWS] Infrastructure destroyed* | branch: \`${{ github.ref_name }}\` | no further charges\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true