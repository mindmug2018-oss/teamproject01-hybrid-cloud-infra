# .github/workflows/deploy.yml

name: Build → Test → Deploy (On-Prem + AWS + Tailscale)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USER }}/fastapi-app
  AWS_REGION: ap-northeast-2
  TF_DIR: terraform

jobs:
  # ════════════════════════════════════════════════════════════════════
  # JOB 1 — Code & Syntax Checks
  # ════════════════════════════════════════════════════════════════════
  test:
    name: Code checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check main.py
        run: |
          python -c "
          import ast
          with open('roles/docker_fastapi/files/app/main.py') as f:
              src = f.read()
          ast.parse(src)
          print('✅ main.py syntax OK')
          "

      - name: Syntax check all YAML files
        run: |
          pip install pyyaml
          python -c "
          import yaml, glob, sys
          files = glob.glob('playbooks/*.yml') + glob.glob('roles/**/*.yml', recursive=True)
          errors = []
          for f in files:
              try:
                  yaml.safe_load(open(f))
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('❌ YAML errors:')
              [print(e) for e in errors]
              sys.exit(1)
          print(f'✅ {len(files)} YAML files OK')
          "

  # ════════════════════════════════════════════════════════════════════
  # JOB 2 — Docker Build & Push
  # ════════════════════════════════════════════════════════════════════
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v6
        with:
          context: roles/docker_fastapi/files/app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ════════════════════════════════════════════════════════════════════
  # JOB 3A — On-Prem Deploy
  # ════════════════════════════════════════════════════════════════════
  deploy-onprem:
    name: Deploy to On-Prem (VMware)
    runs-on: self-hosted
    needs: docker
    steps:
      - name: Pull latest code and run Ansible
        run: |
          set -e
          cd ~/project1-onpremise
          git pull origin main
          ansible-playbook playbooks/site.yml \
            -i inventory/hosts.ini \
            --diff

      - name: Verify on-prem health
        run: |
          sleep 10
          curl -sf http://192.168.61.133/health | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          assert d['status'] == 'ok'
          print('✅ On-prem health OK:', d)
          "

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ *[ON-PREM] Deploy OK* | branch: \`${{ github.ref_name }}\` | by: ${{ github.actor }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"✅ [ON-PREM] Deploy OK\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\"}" || true

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *[ON-PREM] Deploy FAILED* | branch: \`${{ github.ref_name }}\` | by: ${{ github.actor }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"❌ [ON-PREM] Deploy FAILED\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\"}" || true

  # ════════════════════════════════════════════════════════════════════
  # JOB 3B — AWS Deploy with Tailscale
  # GitHub runner joins Tailscale → direct SSH to all EC2 instances
  # No ProxyJump needed → much more reliable
  # ════════════════════════════════════════════════════════════════════
  deploy-aws:
    name: Deploy to AWS (Tailscale + Terraform + Ansible + Destroy)
    runs-on: ubuntu-latest
    needs: docker
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-northeast-2

    steps:
      - uses: actions/checkout@v4.2.2

      # ── Setup tools ─────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Install Ansible
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install community.docker amazon.aws

      # ── Write SSH keys ───────────────────────────────────────────────
      - name: Write SSH key files
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_KEY }}" > ~/.ssh/teamproj01ansiblekey.pem
          chmod 600 ~/.ssh/teamproj01ansiblekey.pem
          echo "${{ secrets.TF_PUBLIC_KEY }}" > ~/.ssh/teamproj01ansiblekey.pub
          chmod 644 ~/.ssh/teamproj01ansiblekey.pub

      # ── Terraform Apply ─────────────────────────────────────────────
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="public_key_path=$HOME/.ssh/teamproj01ansiblekey.pub" \
            -var="admin_cidr=0.0.0.0/0" \
            -var="tailscale_auth_key=${{ secrets.TS_AUTH_KEY }}"

      # ── Save EC2 IPs ─────────────────────────────────────────────────
      - name: Save Terraform outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "MGMT_IP=$(terraform output -raw mgmt_public_ip)" >> $GITHUB_ENV
          echo "ROCKY1_IP=$(terraform output -raw rocky1_private_ip)" >> $GITHUB_ENV
          echo "ROCKY2_IP=$(terraform output -raw rocky2_private_ip)" >> $GITHUB_ENV
          echo "UBUNTU1_IP=$(terraform output -raw ubuntu1_private_ip)" >> $GITHUB_ENV
          echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> $GITHUB_ENV

      # ── Connect GitHub runner to Tailscale ───────────────────────────
      # This is the key step — runner joins the same mesh network as EC2s
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # ── Wait for EC2s to join Tailscale network ──────────────────────
      # EC2s install Tailscale via user_data on boot
      # We wait until we can ping them on Tailscale IPs
      - name: Wait for EC2 instances on Tailscale
        run: |
          echo "Waiting for instances to appear on Tailscale..."
          sleep 60

          # Wait for mgmt public SSH (still needed for first Ansible connection)
          for i in $(seq 1 30); do
            if ssh -i ~/.ssh/teamproj01ansiblekey.pem \
                   -o ConnectTimeout=5 \
                   -o StrictHostKeyChecking=no \
                   -o UserKnownHostsFile=/dev/null \
                   user1@${{ env.MGMT_IP }} "echo ready" 2>/dev/null | grep -q ready; then
              echo "✅ mgmt SSH ready"
              break
            fi
            echo "Attempt $i/30 — waiting 10s..."
            sleep 10
          done

      # ── Get Tailscale IPs from EC2 instances ─────────────────────────
      - name: Get Tailscale IPs from instances
        run: |
          get_ts_ip() {
            local PUBLIC_IP=$1
            local HOST_LABEL=$2
            for i in $(seq 1 20); do
              TS_IP=$(ssh -i ~/.ssh/teamproj01ansiblekey.pem \
                         -o ConnectTimeout=5 \
                         -o StrictHostKeyChecking=no \
                         -o UserKnownHostsFile=/dev/null \
                         user1@${PUBLIC_IP} \
                         "tailscale ip -4 2>/dev/null" 2>/dev/null || echo "")
              if [[ $TS_IP == 100.* ]]; then
                echo "${HOST_LABEL}_TS_IP=${TS_IP}" >> $GITHUB_ENV
                echo "✅ ${HOST_LABEL} Tailscale IP: ${TS_IP}"
                return 0
              fi
              echo "Waiting for ${HOST_LABEL} Tailscale IP... attempt $i/20"
              sleep 10
            done
            echo "⚠️ Could not get Tailscale IP for ${HOST_LABEL}"
          }

          # Get mgmt Tailscale IP (it has public IP so we connect directly)
          get_ts_ip "${{ env.MGMT_IP }}" "MGMT"

          # Get rocky1, rocky2, ubuntu1 Tailscale IPs via ProxyJump (first time only)
          for HOST_PAIR in "ROCKY1:${{ env.ROCKY1_IP }}" "ROCKY2:${{ env.ROCKY2_IP }}" "UBUNTU1:${{ env.UBUNTU1_IP }}"; do
            LABEL="${HOST_PAIR%%:*}"
            IP="${HOST_PAIR##*:}"
            for i in $(seq 1 20); do
              TS_IP=$(ssh -i ~/.ssh/teamproj01ansiblekey.pem \
                         -o ProxyJump=user1@${{ env.MGMT_IP }} \
                         -o ConnectTimeout=5 \
                         -o StrictHostKeyChecking=no \
                         -o UserKnownHostsFile=/dev/null \
                         user1@${IP} \
                         "tailscale ip -4 2>/dev/null" 2>/dev/null || echo "")
              if [[ $TS_IP == 100.* ]]; then
                echo "${LABEL}_TS_IP=${TS_IP}" >> $GITHUB_ENV
                echo "✅ ${LABEL} Tailscale IP: ${TS_IP}"
                break
              fi
              echo "Waiting for ${LABEL} Tailscale IP... attempt $i/20"
              sleep 10
            done
          done

      # ── Generate Tailscale-based inventory ───────────────────────────
      # From this point, all SSH goes via Tailscale — no ProxyJump!
      - name: Generate Tailscale inventory
        run: |
          cat > inventory/hosts_aws_ts.ini << EOF
          # Generated by GitHub Actions — Tailscale mesh IPs
          # No ProxyJump needed — all hosts reachable directly

          [mgmt]
          ${{ env.MGMT_TS_IP }} ansible_user=user1

          [rocky]
          ${{ env.ROCKY1_TS_IP }} ansible_user=user1
          ${{ env.ROCKY2_TS_IP }} ansible_user=user1

          [ubuntu]
          ${{ env.UBUNTU1_TS_IP }} ansible_user=user1

          [all:vars]
          ansible_ssh_private_key_file=$HOME/.ssh/teamproj01ansiblekey.pem
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          db_host=${{ env.UBUNTU1_TS_IP }}
          EOF

          echo "=== Tailscale inventory ==="
          cat inventory/hosts_aws_ts.ini

      # ── Configure ansible.cfg ────────────────────────────────────────
      - name: Configure ansible.cfg for GitHub runner
        run: |
          cat > ansible.cfg << EOF
          [defaults]
          roles_path = $(pwd)/roles
          host_key_checking = False
          allow_world_readable_tmpfiles = True

          [privilege_escalation]
          become = True
          become_method = sudo
          become_user = root
          become_ask_pass = False

          [ssh_connection]
          ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          EOF

      # ── Test Tailscale connectivity ──────────────────────────────────
      - name: Test direct SSH via Tailscale
        run: |
          echo "Testing direct Tailscale connections (no ProxyJump)..."
          for IP in ${{ env.MGMT_TS_IP }} ${{ env.ROCKY1_TS_IP }} ${{ env.ROCKY2_TS_IP }} ${{ env.UBUNTU1_TS_IP }}; do
            if ssh -i ~/.ssh/teamproj01ansiblekey.pem \
                   -o ConnectTimeout=10 \
                   -o StrictHostKeyChecking=no \
                   -o UserKnownHostsFile=/dev/null \
                   user1@${IP} "hostname" 2>/dev/null; then
              echo "✅ ${IP} reachable via Tailscale"
            else
              echo "⚠️ ${IP} not yet reachable"
            fi
          done

      # ── Run Ansible ──────────────────────────────────────────────────
      - name: Run Ansible site_aws.yml via Tailscale
        run: |
          ansible-playbook playbooks/site_aws.yml \
            -i inventory/hosts_aws_ts.ini \
            --diff

      # ── Verify ──────────────────────────────────────────────────────
      - name: Verify AWS ALB health
        run: |
          echo "Waiting 30s for ALB to stabilize..."
          sleep 30
          for i in $(seq 1 10); do
            RESULT=$(curl -sf "http://${{ env.ALB_DNS }}/health" 2>/dev/null || echo "failed")
            if echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['status']=='ok'" 2>/dev/null; then
              echo "✅ AWS health check passed: $RESULT"
              break
            fi
            echo "Attempt $i/10 — retrying... ($RESULT)"
            sleep 15
          done

      # ── Notify success before destroy ────────────────────────────────
      - name: Notify AWS success
        if: success()
        run: |
          MSG="✅ [AWS+Tailscale] Deploy OK\nALB: http://${{ env.ALB_DNS }}/health\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\n⚠️ Destroying in 60s..."
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${MSG}\"}" "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"${MSG}\"}" || true
          sleep 60

      # ── Terraform Destroy (ALWAYS runs) ─────────────────────────────
      - name: Terraform Destroy
        if: always()
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "=== Destroying AWS infrastructure ==="
          terraform destroy -auto-approve \
            -var="public_key_path=$HOME/.ssh/teamproj01ansiblekey.pub" \
            -var="admin_cidr=0.0.0.0/0" \
            -var="tailscale_auth_key=${{ secrets.TS_AUTH_KEY }}" || true
          echo "=== Destroyed: $(date) ==="

      - name: Notify destroy complete
        if: always()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🗑️ [AWS] Infrastructure destroyed — no further charges\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true

      - name: Notify AWS failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *[AWS] Deploy FAILED* | branch: \`${{ github.ref_name }}\` | by: ${{ github.actor }}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H 'Content-type: application/json' \
            --data "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"❌ [AWS] Deploy FAILED\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\"}" || true