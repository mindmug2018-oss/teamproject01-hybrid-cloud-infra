---
# playbooks/prometheus_connect.yml

- name: Validate and restart Prometheus pipeline
  hosts: mgmt
  become: yes
  tasks:

    - name: Validate prometheus.yml syntax
      command: /usr/local/bin/promtool check config /etc/prometheus/prometheus.yml
      register: promtool_result
      changed_when: false

    - name: Show promtool result
      debug:
        msg: "{{ promtool_result.stdout }}"

    - name: Validate alert rules syntax
      command: /usr/local/bin/promtool check rules /etc/prometheus/alert.rules.yml
      register: rules_result
      changed_when: false

    - name: Show rules result
      debug:
        msg: "{{ rules_result.stdout }}"

    - name: Restart Prometheus to apply rules
      systemd:
        name: prometheus
        state: restarted

    - name: Restart Alertmanager
      systemd:
        name: alertmanager
        state: restarted

    - name: Wait for Prometheus to be ready
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      register: prom_health
      until: prom_health.status == 200
      retries: 10
      delay: 3

    - name: Wait for Alertmanager to be ready
      uri:
        url: "http://localhost:9093/-/healthy"
        status_code: 200
      register: am_health
      until: am_health.status == 200
      retries: 10
      delay: 3

    - name: Confirm pipeline is ready
      debug:
        msg: "Prometheus(9090) + Alertmanager(9093) both running OK"