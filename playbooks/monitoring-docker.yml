---
# playbooks/monitoring-docker.yml
# FIXED: node-mgmt uses actual host IP instead of localhost
# FIXED: all targets labeled with environment=aws for easy identification
# in Slack/Telegram alerts vs on-prem alerts

- name: Install Node Exporter on all servers
  hosts: all
  become: yes
  roles:
    - node_exporter

- name: Deploy Docker monitoring stack on mgmt
  hosts: mgmt
  become: yes
  tasks:

    - name: Gather host facts
      setup:
        filter: ansible_default_ipv4

    - name: Set mgmt private IP fact
      set_fact:
        mgmt_private_ip: "{{ ansible_default_ipv4.address }}"

    - name: Create monitoring directory
      file:
        path: /opt/monitoring
        state: directory
        owner: user1
        mode: '0755'

    - name: Debug mgmt IP being used
      debug:
        msg: "Using mgmt IP: {{ mgmt_private_ip }} for Prometheus scrape target"

    - name: Deploy prometheus.yml (AWS Docker version)
      copy:
        dest: /opt/monitoring/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
            # Add AWS label to all metrics from this Prometheus instance
            external_labels:
              environment: 'aws'
              region: 'ap-northeast-2'

          alerting:
            alertmanagers:
              - static_configs:
                  - targets: ['alertmanager:9093']

          rule_files:
            - "alert.rules.yml"

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            # FIXED: use actual host IP so Prometheus can reach
            # node-exporter from inside the Docker network
            - job_name: 'node-mgmt'
              static_configs:
                - targets: ['{{ mgmt_private_ip }}:9100']
                  labels:
                    instance: 'aws-mgmt'
                    environment: 'aws'

            - job_name: 'node-rocky1'
              static_configs:
                - targets: ['{{ groups["rocky"][0] }}:9100']
                  labels:
                    instance: 'aws-rocky1'
                    environment: 'aws'

            - job_name: 'node-rocky2'
              static_configs:
                - targets: ['{{ groups["rocky"][1] }}:9100']
                  labels:
                    instance: 'aws-rocky2'
                    environment: 'aws'

            - job_name: 'node-ubuntu1'
              static_configs:
                - targets: ['{{ groups["ubuntu"][0] }}:9100']
                  labels:
                    instance: 'aws-ubuntu1'
                    environment: 'aws'

            - job_name: 'fastapi-rocky1'
              static_configs:
                - targets: ['{{ groups["rocky"][0] }}:8000']
                  labels:
                    instance: 'aws-rocky1'
                    environment: 'aws'
              metrics_path: '/metrics'

            - job_name: 'fastapi-rocky2'
              static_configs:
                - targets: ['{{ groups["rocky"][1] }}:8000']
                  labels:
                    instance: 'aws-rocky2'
                    environment: 'aws'
              metrics_path: '/metrics'
        owner: user1
        mode: '0644'

    - name: Deploy alert.rules.yml
      copy:
        src: "{{ playbook_dir }}/../roles/monitoring/files/alert.rules.yml"
        dest: /opt/monitoring/alert.rules.yml
        owner: user1
        mode: '0644'

    - name: Deploy alertmanager.yml with AWS prefix in messages
      copy:
        dest: /opt/monitoring/alertmanager.yml
        content: |
          global:
            resolve_timeout: 5m

          route:
            group_by: ['alertname', 'environment']
            group_wait: 5s
            group_interval: 30s
            repeat_interval: 5m
            receiver: 'slack-default'
            routes:
              - match:
                  severity: critical
                receiver: 'slack-and-recovery'
                continue: true
              - match:
                  severity: critical
                receiver: 'telegram'
              - match:
                  severity: warning
                receiver: 'slack-default'
                continue: true
              - match:
                  severity: warning
                receiver: 'telegram'

          receivers:
            - name: 'telegram'
              webhook_configs:
                - url: 'http://{{ mgmt_private_ip }}:9087/alert/8646527871'
                  send_resolved: true

            - name: 'slack-default'
              slack_configs:
                - api_url: "{{ slack_webhook_url }}"
                  channel: '#all-mindmug'
                  send_resolved: true
                  title: '[AWS][{{ "{{" }} .Status | toUpper {{ "}}" }}] {{ "{{" }} .GroupLabels.alertname {{ "}}" }}'
                  text: |
                    {{ "{{" }} range .Alerts {{ "}}" }}
                    *Environment:* AWS ap-northeast-2
                    *Instance:* {{ "{{" }} .Labels.instance {{ "}}" }}
                    *Summary:* {{ "{{" }} .Annotations.summary {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}

            - name: 'slack-and-recovery'
              slack_configs:
                - api_url: "{{ slack_webhook_url }}"
                  channel: '#all-mindmug'
                  send_resolved: true
                  title: '[AWS][CRITICAL] {{ "{{" }} .GroupLabels.alertname {{ "}}" }}'
                  text: |
                    {{ "{{" }} range .Alerts {{ "}}" }}
                    *Environment:* AWS ap-northeast-2
                    *Instance:* {{ "{{" }} .Labels.instance {{ "}}" }}
                    *Summary:* {{ "{{" }} .Annotations.summary {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
              webhook_configs:
                - url: 'http://localhost:9080/alert'
                  send_resolved: false
        owner: user1
        mode: '0644'

    - name: Deploy docker-compose.yml for monitoring
      copy:
        dest: /opt/monitoring/docker-compose.yml
        content: |
          services:
            prometheus:
              image: prom/prometheus:latest
              container_name: prometheus
              ports:
                - "9090:9090"
              volumes:
                - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
                - ./alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
                - prometheus_data:/prometheus
              command:
                - '--config.file=/etc/prometheus/prometheus.yml'
                - '--storage.tsdb.retention.time=15d'
                - '--web.enable-lifecycle'
              restart: unless-stopped
              networks:
                - monitoring

            alertmanager:
              image: prom/alertmanager:latest
              container_name: alertmanager
              ports:
                - "9093:9093"
              volumes:
                - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
              restart: unless-stopped
              networks:
                - monitoring

            grafana:
              image: grafana/grafana:latest
              container_name: grafana
              ports:
                - "3000:3000"
              volumes:
                - grafana_data:/var/lib/grafana
              environment:
                - GF_SECURITY_ADMIN_USER=admin
                - GF_SECURITY_ADMIN_PASSWORD=admin123
              restart: unless-stopped
              networks:
                - monitoring

            node-exporter:
              image: prom/node-exporter:latest
              container_name: node-exporter
              network_mode: host
              pid: host
              volumes:
                - /proc:/host/proc:ro
                - /sys:/host/sys:ro
                - /:/rootfs:ro
              command:
                - '--path.procfs=/host/proc'
                - '--path.sysfs=/host/sys'
                - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|run)($$|/)'
              restart: unless-stopped

          networks:
            monitoring:
              driver: bridge

          volumes:
            prometheus_data:
            grafana_data:
        owner: user1
        mode: '0644'

    - name: Stop systemd node_exporter if running (conflicts with Docker)
      systemd:
        name: node_exporter
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Restart monitoring stack with updated config
      community.docker.docker_compose_v2:
        project_src: /opt/monitoring
        state: present
        recreate: always

    - name: Wait for Prometheus to be ready
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      retries: 15
      delay: 5
      ignore_errors: yes

    - name: Open monitoring ports in firewall
      firewalld:
        port: "{{ item }}/tcp"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - "9090"
        - "9093"
        - "3000"
        - "9100"
      ignore_errors: yes

    - name: Show running monitoring containers
      command: docker ps --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
      register: docker_ps
      changed_when: false

    - name: Display containers
      debug:
        msg: "{{ docker_ps.stdout }}"