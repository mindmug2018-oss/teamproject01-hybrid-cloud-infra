---
# playbooks/site_aws_tailscale.yml
# AWS deployment using Tailscale mesh network
#
# Flow:
#   1. Install Tailscale on all instances (via ProxyJump - first time only)
#   2. After Tailscale is up, all remaining plays use direct Tailscale IPs
#      (no more ProxyJump needed from GitHub Actions runner)
#
# Usage:
#   ansible-playbook playbooks/site_aws_tailscale.yml \
#     -i inventory/hosts_aws_ts.ini \
#     -e tailscale_auth_key=tskey-auth-xxxxx

# ── Phase 1: Bootstrap Tailscale on all instances ─────────────────────
# This still needs ProxyJump for the first connection
- name: Install Tailscale on all servers
  hosts: all
  become: yes
  roles:
    - tailscale

# ── Phase 2: Full deployment (now via Tailscale mesh) ─────────────────
- import_playbook: docker_install.yml
- import_playbook: db.yml
- import_playbook: mgmt.yml
- import_playbook: docker_web.yml
- import_playbook: nginx_selfheal.yml
- import_playbook: monitoring-docker.yml
- import_playbook: prometheus_bot.yml
- import_playbook: prometheus_connect_docker.yml
- import_playbook: recovery_service.yml
- import_playbook: certbot.yml
- import_playbook: notify.yml