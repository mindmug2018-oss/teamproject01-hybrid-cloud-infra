---
# playbooks/prometheus_connect_docker.yml
- name: Validate and restart Prometheus pipeline (Docker)
  hosts: mgmt
  become: yes
  tasks:
    - name: Validate prometheus.yml syntax via Docker
      command: docker exec prometheus promtool check config /etc/prometheus/prometheus.yml
      changed_when: false

    - name: Reload Prometheus configuration
      command: docker exec prometheus kill -SIGHUP 1

    - name: Wait for Prometheus to be ready
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      register: prom_health
      until: prom_health.status == 200
      retries: 10
      delay: 5
