[defaults]
inventory = inventory/hosts.ini
remote_user = user1
private_key_file = ~/.ssh/teamproj01ansiblekey.pem
host_key_checking = False
roles_path = /home/user1/project1-onpremise/roles
allow_world_readable_tmpfiles = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
